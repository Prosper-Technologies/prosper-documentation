name: Trigger Mintlify rebuild

on:
  repository_dispatch:
    types: [api-updated]

jobs:
  trigger-rebuild:
    name: Trigger rebuild
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update trigger file
        run: echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .last-api-update

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-api-update
          git commit -m "chore: trigger Mintlify rebuild after API deploy"
          git push
